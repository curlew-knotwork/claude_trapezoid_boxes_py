<?xml version="1.0" encoding="UTF-8"?>
<!-- 01_corel_complex.svg — nested group + compound path CorelDRAW import test -->
<svg xmlns="http://www.w3.org/2000/svg"
     width="17.00mm" height="14.00mm"
     viewBox="0 0 17.00 14.00">

<defs>
  <clipPath id="clip1">
    <rect x="2.50" y="2.50" width="12.00" height="5.00"/>
  </clipPath>
</defs>

<g id="g_outer">

  <!-- inner group: 5-circle chain (3 cut + 3 etch, overlap at circle 2), clipped -->
  <g id="g_circles" clip-path="url(#clip1)">
    <path d="M 1.5000 5.0000 A 2.0000 2.0000 0 0 1 4.7500 3.4388 A 2.0000 2.0000 0 0 1 7.2500 3.4388 A 2.0000 2.0000 0 0 1 10.5000 5.0000 A 2.0000 2.0000 0 0 1 7.2500 6.5612 A 2.0000 2.0000 0 0 1 4.7500 6.5612 A 2.0000 2.0000 0 0 1 1.5000 5.0000 Z"  stroke="#FF0000" stroke-width="0.3" fill="none"/>
    <path d="M 6.5000 5.0000 A 2.0000 2.0000 0 0 1 9.7500 3.4388 A 2.0000 2.0000 0 0 1 12.2500 3.4388 A 2.0000 2.0000 0 0 1 15.5000 5.0000 A 2.0000 2.0000 0 0 1 12.2500 6.5612 A 2.0000 2.0000 0 0 1 9.7500 6.5612 A 2.0000 2.0000 0 0 1 6.5000 5.0000 Z" stroke="#000000" stroke-width="0.3" fill="none"/>
  </g>

  <!-- rect cut (Red) -->
  <rect x="1.50" y="2.50" width="4.00" height="5.00" stroke="#FF0000" stroke-width="0.3" fill="none"/>
  <!-- rect etch (Black) -->
  <rect x="11.50" y="2.50" width="4.00" height="5.00" stroke="#000000" stroke-width="0.3" fill="none"/>

</g>

<text x="1" y="10.0" font-size="1" font-family="sans-serif" fill="black">5-circ cut+etch clipped</text>
<text x="1" y="11.5" font-size="1" font-family="sans-serif" fill="black">1 obj? not locked?</text>

</svg>
